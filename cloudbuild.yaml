# Build de la imagen de JSM Flow para Cloud Run.
# Las NEXT_PUBLIC_* (públicas) se pasan como build args porque Next.js las inlinea
# en el bundle del navegador durante `next build`.
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg=NEXT_PUBLIC_SUPABASE_URL=${_SUPABASE_URL}
      - --build-arg=NEXT_PUBLIC_SUPABASE_ANON_KEY=${_SUPABASE_ANON_KEY}
      - --build-arg=NEXT_PUBLIC_LIVEDEV_APP_ID=${_LIVEDEV_APP_ID}
      - --build-arg=NEXT_PUBLIC_LIVEDEV_TOKEN=${_LIVEDEV_TOKEN}
      - -t
      - ${_IMAGE}
      - .
images:
  - ${_IMAGE}
options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
timeout: 1800s
